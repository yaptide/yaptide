# Single-node SLURM configuration for local development.
# Hostname "slurm" must match: docker-compose service hostname,
# SlurmctldHost, and NodeName below.

ClusterName=localcluster
SlurmctldHost=slurm

AuthType=auth/munge

MpiDefault=none
ProctrackType=proctrack/pgid
ReturnToService=2
TaskPlugin=task/none

SlurmctldPort=6817
SlurmdPort=6818
SlurmctldPidFile=/run/slurm/slurmctld.pid
SlurmdPidFile=/run/slurm/slurmd.pid

SlurmdSpoolDir=/var/spool/slurmd
StateSaveLocation=/var/spool/slurmctld

SwitchType=switch/none
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core

SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log

# No external accounting database needed for local dev.
# sacct will query in-memory job records via slurmctld.
AccountingStorageType=accounting_storage/none
JobAcctGatherType=jobacct_gather/none
JobCompType=jobcomp/none

# Single compute node — same host as the controller.
NodeName=slurm CPUs=4 RealMemory=1000 State=UNKNOWN
PartitionName=debug Nodes=slurm Default=YES MaxTime=INFINITE State=UP
